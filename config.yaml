# Triage boards configuration — one Kanban board per project, published at
# /<slug>/ (the key under `projects` is the URL slug). Every setting in
# `defaults` can be overridden per project.

defaults:
  # Days without meaningful activity before an item is moved to the Stale column
  stale_days: 80

  # An issue with ALL of these fields set is considered triaged and skips
  # "Needs first response". issue_type is GitHub's native type (Bug/Feature/
  # Task); other entries are Projects-v2 single-select field names (lowercase).
  triaged_when_set:
    - issue_type
    - priority

  # Logins whose activity is ignored entirely (never counts as meaningful
  # activity). Any login ending in "[bot]" is also ignored automatically.
  bots:
    - github-actions
    - dependabot
    - copilot
    - chatgpt-codex-connector
    - coderabbitai
    - cursoragent
    - copy-pr-bot
    - nvidia-copy-pr-bot

projects:
  grove:
    title: Grove triage board
    repo:
      owner: ai-dynamo
      name: grove
    # GitHub logins treated as maintainers/team. If the last meaningful
    # activity on an item was by someone NOT on this list, the item needs
    # maintainer attention.
    maintainers:
