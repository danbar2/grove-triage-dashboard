name: Build & deploy triage boards

on:
  schedule:
    - cron: "*/15 * * * *"   # every ~15 min (Actions cron is best-effort)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pyyaml

      - name: Generate boards
        run: python generate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with repo + read:project, used only to read Priority/Severity
          # project fields. NVIDIA enterprise policy: lifetime must be <= 366
          # days or the org rejects it. Optional — the script falls back.
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
