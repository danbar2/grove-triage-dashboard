name: Build & deploy triage dashboard

on:
  schedule:
    - cron: "0 6,18 * * *"   # twice a day, UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pyyaml

      - name: Generate dashboard
        run: python generate.py
        env:
          # PROJECTS_TOKEN (a PAT with repo + read:project) is needed to read
          # Priority/Severity project fields; falls back to the default token,
          # which can see everything else.
          GITHUB_TOKEN: ${{ secrets.PROJECTS_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
